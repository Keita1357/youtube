html<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Player</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; }
        input { padding: 10px; width: 60%; max-width: 400px; border: none; border-radius: 4px; font-size: 16px; }
        button { padding: 10px 20px; border: none; background: #ff0000; color: white; border-radius: 4px; cursor: pointer; font-size: 16px; margin-left: 10px; }
        .container { margin-top: 20px; position: relative; width: 100%; max-width: 800px; margin-left: auto; margin-right: auto; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; border-radius: 8px; }
    </style>
</head>
<body>
    <h2>Private YouTube Player</h2>
    <p>YouTubeの動画URL、または動画IDを入力してください</p>
    <input id="urlInput" placeholder="https://youtube.com... または 動画ID">
    <button onclick="playVideo()">再生</button>

    <div class="container">
        <div class="video-wrapper">
            <iframe id="player" src="about:blank" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        function playVideo() {
            var input = document.getElementById('urlInput').value.trim();
            var videoId = "";
            
            if (input.includes("v=")) {
                videoId = input.split("v=")[1].split("&")[0];
            } else if (input.includes("youtu.be/")) {
                videoId = input.split("youtu.be/")[1].split("?")[0];
            } else if (input.includes("embed/")) {
                videoId = input.split("embed/")[1].split("?")[0];
            } else {
                videoId = input;
            }

            if (videoId) {
                document.getElementById('player').src = "https://youtube-nocookie.com" + videoId + "?autoplay=1";
            } else {
                alert("正しいURLか動画IDを入力してください");
            }
        }
    </script>
</body>
</html>
